<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>猫药管家 v2 — 设计预览</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@300;400;500;600;700&family=Varela+Round&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
<style>
/* ============ 设计变量（你随便改） ============ */
:root {
    --c-primary: #0891B2;
    --c-primary-light: #E0F7FA;
    --c-secondary: #22D3EE;
    --c-cta: #059669;
    --c-danger: #E57373;
    --c-success: #43A047;
    --c-warning: #FFA726;
    --c-bg: #ECFEFF;
    --c-surface: #FFFFFF;
    --c-text: #164E63;
    --c-text-secondary: #5E8A94;
    --c-border: #CCEBF2;
    --c-divider: #E0F2F4;
    --font-heading: 'Varela Round', 'PingFang SC', sans-serif;
    --font-body: 'Nunito Sans', 'PingFang SC', sans-serif;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 1px 3px rgba(8,145,178,0.06);
    --header-h: 52px;
    --nav-h: 60px;
}

* { margin:0; padding:0; box-sizing:border-box; }

/* Material Icons */
.m-icon {
    font-family: 'Material Symbols Outlined';
    font-weight: 400;
    font-style: normal;
    font-size: 20px;
    line-height: 1;
    display: inline-block;
    vertical-align: middle;
}
.m-icon.lg { font-size: 28px; }
.m-icon.xl { font-size: 36px; }
body {
    font-family: var(--font-body);
    background: var(--c-bg);
    color: var(--c-text);
    padding: var(--header-h) 0 var(--nav-h) 0;
    min-height: 100vh;
    -webkit-tap-highlight-color: transparent;
}

/* ============ 顶部栏 ============ */
.header {
    position: fixed; top:0; left:0; right:0; z-index:100;
    height: var(--header-h);
    background: var(--c-surface);
    border-bottom: 1px solid var(--c-border);
    display: flex; align-items: center; padding: 0 20px;
    justify-content: space-between;
}
.header h1 { font-size: 18px; font-weight: 600; }
.header .date { font-size: 13px; color: var(--c-text-secondary); }

/* ============ 内容区 ============ */
.main {
    max-width: 420px;
    margin: 0 auto;
    padding: 16px 16px 24px;
}
.page { display: none; }
.page.active { display: block; }

/* ============ 卡片 ============ */
.card {
    background: var(--c-surface);
    border-radius: var(--radius);
    padding: 18px 16px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
}
.card-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
}
.card-title { font-size: 15px; font-weight: 600; font-family: var(--font-heading); }
.card-subtitle { font-size: 12px; color: var(--c-text-secondary); }

/* ============ 今日事件列表 ============ */
.event-row {
    display: flex; align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--c-divider);
    gap: 12px;
}
.event-row:last-child { border-bottom: none; }
.event-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
}
.event-info { flex:1; min-width:0; }
.event-name { font-size: 15px; font-weight: 600; }
.event-progress-text { font-size: 12px; color: var(--c-text-secondary); margin-top: 2px; }
.event-actions { display: flex; gap: 6px; flex-shrink: 0; }
.event-record-btn {
    width: 36px; height: 36px; border-radius: 50%;
    border: 2px solid var(--c-border);
    background: var(--c-surface);
    font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
}
.event-record-btn.done {
    background: var(--c-success);
    border-color: var(--c-success);
    color: white;
}
.event-record-btn.pending {
    border-color: #DDD;
}
.event-record-btn:active { transform: scale(0.92); }

/* 进度条 */
.event-bar-wrap {
    height: 4px; background: var(--c-divider); border-radius: 2px;
    margin-top: 4px; overflow: hidden;
}
.event-bar-fill {
    height: 100%; border-radius: 2px;
    transition: width 0.3s ease;
}

/* 空状态 */
.empty-events {
    text-align: center; padding: 24px 0;
    color: var(--c-text-secondary); font-size: 14px;
}

/* ============ 计算器 ============ */
.calc-group { margin-bottom: 14px; }
.calc-label {
    font-size: 13px; font-weight: 500; color: var(--c-text-secondary);
    margin-bottom: 6px; display: block;
}
.calc-input {
    width: 100%; padding: 12px 14px;
    border: 1px solid var(--c-border); border-radius: var(--radius-sm);
    font-size: 16px; background: var(--c-bg);
    outline: none; transition: border-color 0.2s;
}
.calc-input:focus { border-color: var(--c-primary); }
.calc-quick {
    display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px;
}
.calc-quick button {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--c-border);
    background: var(--c-surface);
    font-size: 12px; color: var(--c-text-secondary);
    cursor: pointer;
}

.calc-result {
    margin-top: 16px; padding: 18px;
    background: var(--c-primary-light);
    border-radius: var(--radius);
    display: none;
}
.calc-result .big-num {
    font-size: 36px; font-weight: 700; color: var(--c-primary);
    line-height: 1.2;
}
.calc-result .big-unit { font-size: 16px; font-weight: 500; margin-left: 2px; }
.calc-result .detail {
    font-size: 13px; color: var(--c-text-secondary);
    margin-top: 10px; line-height: 1.7;
}
.calc-result .detail span { color: var(--c-text); font-weight: 500; }

/* ============ 日历 ============ */
.cal-nav {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 16px;
}
.cal-nav button {
    width: 32px; height: 32px; border: none; border-radius: 50%;
    background: var(--c-bg); font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--c-text);
}
.cal-month-label { font-size: 16px; font-weight: 600; }
.cal-weekdays {
    display: grid; grid-template-columns: repeat(7, 1fr);
    text-align: center; font-size: 11px; color: var(--c-text-secondary);
    margin-bottom: 6px; padding: 0 4px;
}
.cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 2px;
}
.cal-day {
    aspect-ratio: 1;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    font-size: 14px; border-radius: 10px;
    cursor: pointer; position: relative;
    min-height: 38px;
}
.cal-day.other { color: #D0D0D6; }
.cal-day.today { font-weight: 700; }
.cal-day.today::after {
    content: ''; position: absolute; bottom: 3px;
    width: 4px; height: 4px; border-radius: 50%;
    background: var(--c-primary);
}
.cal-day.selected { background: var(--c-primary); color: white; }
.cal-day.selected.today::after { background: white; }
.cal-dots {
    display: flex; gap: 3px; margin-top: 1px;
}
.cal-dot {
    width: 5px; height: 5px; border-radius: 50%;
}
.cal-legend {
    display: flex; gap: 16px; margin-top: 12px;
    font-size: 12px; color: var(--c-text-secondary);
}
.cal-legend-item {
    display: flex; align-items: center; gap: 5px;
}
.cal-legend-dot {
    width: 8px; height: 8px; border-radius: 50%;
}

/* 选中日详情 */
.day-summary {
    font-size: 14px; line-height: 1.8;
    min-height: 36px;
}
.day-summary .no-record {
    color: var(--c-text-secondary);
    text-align: center; padding: 12px 0;
}

/* ============ 设置 ============ */
.event-type-item {
    display: flex; align-items: center; padding: 14px 0;
    border-bottom: 1px solid var(--c-divider); gap: 12px;
}
.event-type-item:last-child { border-bottom: none; }
.event-type-icon {
    width: 40px; height: 40px; border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
}
.event-type-info { flex: 1; }
.event-type-name { font-size: 15px; font-weight: 600; }
.event-type-meta {
    font-size: 12px; color: var(--c-text-secondary); margin-top: 2px;
}
.event-type-toggle {
    width: 48px; height: 28px; border-radius: 14px;
    border: none; cursor: pointer; position: relative;
    transition: background 0.2s;
    background: #DDD;
}
.event-type-toggle.on { background: var(--c-primary); }
.event-type-toggle::after {
    content: ''; position: absolute;
    width: 22px; height: 22px; border-radius: 50%;
    background: white; top: 3px; left: 3px;
    transition: transform 0.2s;
}
.event-type-toggle.on::after { transform: translateX(20px); }
.delete-btn {
    background: none; border: none;
    color: var(--c-danger); font-size: 13px;
    cursor: pointer; padding: 4px 8px;
}

/* ============ 弹窗 ============ */
.modal-overlay {
    position: fixed; top:0; left:0; right:0; bottom:0;
    background: rgba(0,0,0,0.35); z-index: 200;
    display: flex; align-items: center; justify-content: center;
    padding: 24px;
}
.modal {
    background: var(--c-surface); border-radius: var(--radius);
    padding: 24px; width: 100%; max-width: 380px;
}
.modal h3 { font-size: 18px; margin-bottom: 18px; }
.modal .field { margin-bottom: 14px; }
.modal .field label { font-size: 13px; color: var(--c-text-secondary); display: block; margin-bottom: 4px; }
.modal .field input, .modal .field select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--c-border); border-radius: var(--radius-sm);
    font-size: 15px; outline: none;
}
.modal .field input:focus { border-color: var(--c-primary); }
.modal .btn-row { display: flex; gap: 8px; margin-top: 20px; }
.modal .btn-row button { flex: 1; }
.time-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
.time-pill {
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--c-border);
    background: var(--c-surface);
    font-size: 12px; cursor: pointer;
    display: flex; align-items: center; gap: 4px;
}
.time-pill .remove { color: var(--c-danger); cursor: pointer; font-weight: 700; }
.time-pill.selected { border-color: var(--c-primary); background: var(--c-primary-light); }
.add-time-btn {
    padding: 6px 14px; border-radius: 20px;
    border: 1px dashed var(--c-border);
    background: none;
    font-size: 12px; color: var(--c-text-secondary);
    cursor: pointer;
}

/* ============ 按钮 ============ */
.btn {
    padding: 12px 20px; border-radius: var(--radius-sm);
    font-size: 15px; font-weight: 600; cursor: pointer;
    border: none; transition: opacity 0.2s;
}
.btn:active { opacity: 0.75; }
.btn-primary { background: var(--c-primary); color: white; }
.btn-outline { background: var(--c-surface); color: var(--c-primary); border: 1px solid var(--c-primary); }
.btn-full { display: block; width: 100%; margin-top: 8px; }
.btn-sm { padding: 6px 14px; font-size: 13px; border-radius: 20px; }

/* ============ 底部导航 ============ */
.nav {
    position: fixed; bottom:0; left:0; right:0; z-index:100;
    height: var(--nav-h);
    background: var(--c-surface);
    border-top: 1px solid var(--c-border);
    display: flex;
}
.nav-item {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 2px; border: none; background: none;
    color: var(--c-text-secondary);
    font-size: 11px; cursor: pointer;
    padding: 4px;
}
.nav-item .nav-icon { font-size: 24px; }
.nav-item.active { color: var(--c-primary); }

/* 开关组件 */
.switch-wrap { display: flex; align-items: center; gap: 8px; }
.switch-wrap label { font-size: 13px; color: var(--c-text-secondary); }
</style>
</head>
<body>

<header class="header">
    <h1>猫药管家</h1>
    <span class="date" id="headerDate"></span>
</header>

<main class="main">

    <!-- ===== 首页 ===== -->
    <section id="page-home" class="page active">
        <div class="card">
            <div class="card-header">
                <span class="card-title">今日事件</span>
                <span class="card-subtitle" id="todaySummary"></span>
            </div>
            <div id="eventList"><div class="empty-events">暂无事件，去「设置」添加</div></div>
        </div>
    </section>

    <!-- ===== 计算器 ===== -->
    <section id="page-calc" class="page">
        <div class="card">
            <div class="card-title" style="margin-bottom:14px">分药计算器</div>
            <div class="calc-group">
                <label class="calc-label">猫咪体重</label>
                <input type="number" class="calc-input" id="calcWeight" step="0.1" placeholder="kg，例：5.0">
            </div>
            <div class="calc-group">
                <label class="calc-label">医嘱剂量</label>
                <input type="number" class="calc-input" id="calcDosage" step="0.5" placeholder="mg/kg，例：5">
            </div>
            <div class="calc-group">
                <label class="calc-label">药片规格</label>
                <input type="number" class="calc-input" id="calcStrength" step="0.1" placeholder="mg/片，例：30">
                <div class="calc-quick" id="quickPills"></div>
            </div>
            <button class="btn btn-primary btn-full" onclick="doCalc()">计算</button>
            <div class="calc-result" id="calcResult">
                <div class="big-num" id="calcMainResult"></div>
                <div class="detail" id="calcDetail"></div>
            </div>
        </div>
    </section>

    <!-- ===== 日历 ===== -->
    <section id="page-cal" class="page">
        <div class="card">
            <div class="cal-nav">
                <button onclick="changeMonth(-1)">‹</button>
                <span class="cal-month-label" id="calLabel"></span>
                <button onclick="changeMonth(1)">›</button>
            </div>
            <div class="cal-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
            <div class="cal-grid" id="calGrid"></div>
            <div class="cal-legend" id="calLegend"></div>
        </div>
        <div class="card">
            <div class="card-title" style="margin-bottom:8px">日详情</div>
            <div class="day-summary" id="daySummary"></div>
        </div>
        <div class="card">
            <div class="card-title" style="margin-bottom:8px">本月统计</div>
            <div id="monthStats" style="font-size:14px;line-height:2"></div>
        </div>
    </section>

    <!-- ===== 设置 ===== -->
    <section id="page-settings" class="page">
        <div class="card">
            <div class="card-header">
                <span class="card-title">事件类型</span>
                <button class="btn btn-sm btn-outline" onclick="showAddType()">+ 添加</button>
            </div>
            <div id="typeList"><div class="empty-events">暂无事件类型</div></div>
        </div>
    </section>

</main>

<nav class="nav">
    <button class="nav-item active" data-tab="home"><span class="nav-icon m-icon">home</span>首页</button>
    <button class="nav-item" data-tab="calc"><span class="nav-icon m-icon">calculate</span>计算器</button>
    <button class="nav-item" data-tab="cal"><span class="nav-icon m-icon">calendar_month</span>日历</button>
    <button class="nav-item" data-tab="settings"><span class="nav-icon m-icon">settings</span>设置</button>
</nav>

<!-- ===== 添加/编辑事件类型弹窗 ===== -->
<div class="modal-overlay" id="typeModal" style="display:none">
    <div class="modal">
        <h3 id="typeModalTitle">添加事件类型</h3>
        <input type="hidden" id="editTypeId">
        <div class="field">
            <label>名称</label>
            <input type="text" id="typeName" placeholder="如：喂药、运动、喝水">
        </div>
        <div class="field">
            <label>图标</label>
            <select id="typeIcon">
                <option value="pill">pill 药品</option>
                <option value="exercise">exercise 运动</option>
                <option value="water_drop">water_drop 喝水</option>
                <option value="science">science 补剂</option>
                <option value="restaurant">restaurant 饮食</option>
                <option value="menu_book">menu_book 阅读</option>
                <option value="pets">pets 宠物</option>
                <option value="favorite">favorite 重要</option>
            </select>
        </div>
        <div class="field">
            <label>颜色</label>
            <select id="typeColor">
                <option value="#5B8DEF">蓝</option>
                <option value="#4CAF50">绿</option>
                <option value="#F5A623">橙</option>
                <option value="#EF6B6B">红</option>
                <option value="#9B59B6">紫</option>
                <option value="#1ABC9C">青</option>
            </select>
        </div>
        <div class="field">
            <label>每日目标次数</label>
            <input type="number" id="typeDaily" value="2" min="1" max="10">
        </div>
        <div class="field switch-wrap">
            <button class="event-type-toggle on" id="typeRemindToggle" onclick="toggleRemind()"></button>
            <label>开启定时提醒</label>
        </div>
        <div class="field" id="remindTimesField">
            <label>提醒时间</label>
            <div class="time-pills" id="remindPills"></div>
            <button class="add-time-btn" onclick="addRemindTime()">+ 添加时间</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-outline" onclick="closeTypeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveType()">保存</button>
        </div>
    </div>
</div>

<script>
// ===== 数据存储（预览版用 localStorage 模拟） =====
const STORE_KEY = 'catmed_preview';

function loadData() {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
    // 默认数据
    return {
        types: [
            { id:1, name:'喂药', icon:'pill', color:'#0891B2', dailyTarget:2, reminders:['08:30','20:30'], remindOn:true },
            { id:2, name:'运动', icon:'exercise', color:'#43A047', dailyTarget:1, reminders:[], remindOn:false },
            { id:3, name:'喝水', icon:'water_drop', color:'#22D3EE', dailyTarget:3, reminders:['09:00','13:00','17:00'], remindOn:true },
            { id:4, name:'补剂', icon:'science', color:'#FFA726', dailyTarget:1, reminders:['21:00'], remindOn:true }
        ],
        records: [],
        nextId: 5
    };
}
function saveData(d) { localStorage.setItem(STORE_KEY, JSON.stringify(d)); }

let DATA = loadData();
function save() { saveData(DATA); }

// ===== 工具 =====
function todayStr() {
    const d = new Date();
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function tsToStr(ts) {
    const d = new Date(ts);
    return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
}
function dateKey(y,m,d) { return y+'-'+String(m).padStart(2,'0')+'-'+String(d).padStart(2,'0'); }

// ===== 今日事件 =====
function getTodayRecords() {
    const ts = todayStr();
    return DATA.records.filter(r => tsToStr(r.time) === ts);
}

function refreshHome() {
    const today = getTodayRecords();
    const el = document.getElementById('eventList');
    if (DATA.types.length === 0) {
        el.innerHTML = '<div class="empty-events">暂无事件，去「设置」添加</div>';
        document.getElementById('todaySummary').textContent = '';
        return;
    }

    let totalDone = 0, totalTarget = 0;
    let html = '';
    for (const t of DATA.types) {
        const count = today.filter(r => r.typeId === t.id && !r.undone).length;
        totalDone += count; totalTarget += t.dailyTarget;

        const slots = [];
        for (let i = 0; i < t.dailyTarget; i++) {
            const done = i < count;
            slots.push(`<button class="event-record-btn ${done?'done':'pending'}"
                onclick="${done ? 'removeRecord('+t.id+')' : 'addRecord('+t.id+')'}"
                title="${done?'撤销':'我做了！'}">${done?'✓':''}</button>`);
        }

        const pct = Math.round(count / t.dailyTarget * 100);
        html += `
            <div class="event-row">
                <div class="event-icon" style="background:${t.color}20;color:${t.color}"><span class="m-icon lg">${t.icon}</span></div>
                <div class="event-info">
                    <div class="event-name">${t.name}</div>
                    <div class="event-progress-text">${count > 0 ? '已记录 ' + count + ' 次' : '今天还没记录'}</div>
                    <div class="event-bar-wrap"><div class="event-bar-fill" style="width:${pct}%;background:${t.color}"></div></div>
                </div>
                <div class="event-actions">${slots.join('')}</div>
            </div>`;
    }
    el.innerHTML = html;
    document.getElementById('todaySummary').textContent = totalDone > 0 ? '今日已记录 ' + totalDone + ' 次' : '今天还没开始记录';
}

function addRecord(typeId) {
    DATA.records.push({ typeId, time: Date.now(), undone: false });
    save(); refreshHome(); refreshCalendar();
}
function removeRecord(typeId) {
    const today = todayStr();
    const existing = DATA.records.filter(r => r.typeId === typeId && tsToStr(r.time) === today && !r.undone);
    if (existing.length > 0) {
        DATA.records = DATA.records.filter(r => r !== existing[existing.length - 1]);
    }
    save(); refreshHome(); refreshCalendar();
}

// ===== 计算器 =====
function doCalc() {
    const w = parseFloat(document.getElementById('calcWeight').value);
    const d = parseFloat(document.getElementById('calcDosage').value);
    const s = parseFloat(document.getElementById('calcStrength').value);
    if (!w || !d || !s) return;

    const needMg = w * d;
    const pills = needMg / s;
    // 最简分数
    function gcd(a,b) { return b?gcd(b,a%b):a; }
    const denom = [1,2,3,4,5,6,8].reduce((best,x) => Math.abs(pills - Math.round(pills*x)/x) < Math.abs(pills - Math.round(pills*best)/best) ? x : best, 1);
    const num = Math.round(pills * denom);
    const g = gcd(num, denom);
    const fNum = num/g, fDen = denom/g;

    const el = document.getElementById('calcResult');
    el.style.display = 'block';
    document.getElementById('calcMainResult').innerHTML =
        '<span class="big-num">' + needMg.toFixed(1) + '</span><span class="big-unit">mg / 次</span>';
    document.getElementById('calcDetail').innerHTML =
        '等于 <span>' + pills.toFixed(2) + '</span> 片' +
        (fDen > 1 ? '（约 <span>' + fNum + '/' + fDen + '</span> 片）' : '') +
        '<br>计算过程：' + w + 'kg × ' + d + 'mg/kg = ' + needMg.toFixed(1) + 'mg<br>' +
        needMg.toFixed(1) + 'mg ÷ ' + s + 'mg/片 = ' + pills.toFixed(2) + '片';
}

// ===== 日历 =====
let calYear, calMonth;
function initCal() {
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth() + 1;
}
function changeMonth(d) {
    calMonth += d;
    if (calMonth > 12) { calMonth = 1; calYear++; }
    if (calMonth < 1) { calMonth = 12; calYear--; }
    refreshCalendar();
}

function refreshCalendar() {
    document.getElementById('calLabel').textContent = calYear + '年' + calMonth + '月';
    const firstDay = new Date(calYear, calMonth-1, 1).getDay();
    const daysInMonth = new Date(calYear, calMonth, 0).getDate();
    const prevDays = new Date(calYear, calMonth-1, 0).getDate();
    const today = todayStr();

    // 本月记录按日期分组
    const byDay = {};
    for (const r of DATA.records) {
        const ds = tsToStr(r.time);
        if (!byDay[ds]) byDay[ds] = {};
        if (!byDay[ds][r.typeId]) byDay[ds][r.typeId] = 0;
        if (!r.undone) byDay[ds][r.typeId]++;
    }

    let html = '';
    // 上月填充
    for (let i = firstDay-1; i >= 0; i--) {
        html += '<div class="cal-day other">' + (prevDays - i) + '</div>';
    }
    // 当月
    for (let d = 1; d <= daysInMonth; d++) {
        const ds = dateKey(calYear, calMonth, d);
        const isToday = ds === today;
        const dayData = byDay[ds] || {};

        let cls = 'cal-day';
        if (isToday) cls += ' today';

        let dots = '';
        for (const t of DATA.types) {
            const count = dayData[t.id] || 0;
            const pct = count / t.dailyTarget;
            if (pct >= 1) {
                dots += '<span class="cal-dot" style="background:' + t.color + '"></span>';
            } else if (pct > 0) {
                dots += '<span class="cal-dot" style="background:' + t.color + ';opacity:0.4"></span>';
            }
        }

        html += '<div class="' + cls + '" data-ds="' + ds + '" onclick="pickDay(\'' + ds + '\', this)">' + d + '<div class="cal-dots">' + dots + '</div></div>';
    }
    // 下月填充
    const total = firstDay + daysInMonth;
    const rem = (7 - total % 7) % 7;
    for (let i = 1; i <= rem; i++) {
        html += '<div class="cal-day other">' + i + '</div>';
    }
    document.getElementById('calGrid').innerHTML = html;

    // 图例
    document.getElementById('calLegend').innerHTML = DATA.types.map(t =>
        '<div class="cal-legend-item"><span class="cal-legend-dot" style="background:' + t.color + '"></span>' + t.name + '</div>'
    ).join('');

    // 月度统计
    refreshMonthStats();

    // 选中日详情
    const selDay = document.querySelector('.cal-day.selected');
    if (selDay) pickDay(selDay.dataset.ds, selDay);
}

function refreshMonthStats() {
    const start = new Date(calYear, calMonth-1, 1).getTime();
    const end = new Date(calYear, calMonth, 0, 23, 59, 59).getTime();

    // 按类型统计
    const stats = {};
    let totalDays = new Date(calYear, calMonth, 0).getDate();
    for (const r of DATA.records) {
        if (r.time >= start && r.time <= end && !r.undone) {
            if (!stats[r.typeId]) stats[r.typeId] = 0;
            stats[r.typeId]++;
        }
    }

    const daysInMonth = totalDays;
    let html = '';
    for (const t of DATA.types) {
        const count = stats[t.id] || 0;
        const target = t.dailyTarget * daysInMonth;
        const pct = target > 0 ? Math.round(count / target * 100) : 0;
        const bar = '█'.repeat(Math.round(pct/10)) + '░'.repeat(10 - Math.round(pct/10));
        html += '<div style="margin-bottom:8px">' +
            '<span><span class="m-icon" style="font-size:16px;color:' + t.color + '">' + t.icon + '</span> <strong>' + t.name + '</strong></span>' +
            '<span style="float:right;color:var(--c-text-secondary)">' + count + ' / ' + target + ' 次</span>' +
            '<div style="font-size:10px;color:#CCC;letter-spacing:2px;margin-top:2px">' + bar + ' ' + pct + '%</div>' +
            '</div>';
    }
    document.getElementById('monthStats').innerHTML = html;
}

function pickDay(ds, el) {
    document.querySelectorAll('.cal-day.selected').forEach(x => x.classList.remove('selected'));
    el.classList.add('selected');
    const dayData = {};
    for (const r of DATA.records) {
        if (tsToStr(r.time) === ds && !r.undone) {
            if (!dayData[r.typeId]) dayData[r.typeId] = 0;
            dayData[r.typeId]++;
        }
    }
    const parts = ds.split('-');
    const label = parts[0] + '年' + parseInt(parts[1]) + '月' + parseInt(parts[2]) + '日';

    let html = '<div style="font-weight:600;margin-bottom:6px">' + label + '</div>';
    let hasAny = false;
    for (const t of DATA.types) {
        const c = dayData[t.id] || 0;
        hasAny = hasAny || c > 0;
        const desc = c > 0
            ? '<span style="color:var(--c-success);font-weight:500">已记录 ' + c + ' 次</span>'
            : '<span style="color:var(--c-text-secondary)">未记录</span>';
        html += '<div><span class="m-icon" style="font-size:16px;color:' + t.color + '">' + t.icon + '</span> ' + t.name + '：' + desc + '</div>';
    }
    if (!hasAny) html += '<div class="no-record">这天还没有记录</div>';
    document.getElementById('daySummary').innerHTML = html;
}

// ===== 设置 =====
function refreshSettings() {
    const el = document.getElementById('typeList');
    if (DATA.types.length === 0) {
        el.innerHTML = '<div class="empty-events">暂无事件类型，点上方按钮添加</div>';
        return;
    }
    el.innerHTML = DATA.types.map(t => {
        const remStr = t.remindOn && t.reminders.length > 0
            ? '提醒 ' + t.reminders.join('、')
            : '不提醒';
        return `<div class="event-type-item">
            <div class="event-type-icon" style="background:${t.color}20;color:${t.color}"><span class="m-icon lg">${t.icon}</span></div>
            <div class="event-type-info">
                <div class="event-type-name">${t.name}</div>
                <div class="event-type-meta">每日 ${t.dailyTarget} 次 · ${remStr}</div>
            </div>
            <button class="btn btn-sm btn-outline" onclick="editType(${t.id})" style="margin-right:4px">编辑</button>
            <button class="delete-btn" onclick="deleteType(${t.id})">删除</button>
        </div>`;
    }).join('');
}

function showAddType() {
    document.getElementById('typeModalTitle').textContent = '添加事件类型';
    document.getElementById('editTypeId').value = '';
    document.getElementById('typeName').value = '';
    document.getElementById('typeIcon').value = 'pill';
    document.getElementById('typeColor').value = '#0891B2';
    document.getElementById('typeDaily').value = 2;
    remindOn = true;
    document.getElementById('typeRemindToggle').className = 'event-type-toggle on';
    document.getElementById('remindTimesField').style.display = 'block';
    remindTimes = ['08:00'];
    renderRemindPills();
    document.getElementById('typeModal').style.display = 'flex';
}

function editType(id) {
    const t = DATA.types.find(x => x.id === id);
    if (!t) return;
    document.getElementById('typeModalTitle').textContent = '编辑事件类型';
    document.getElementById('editTypeId').value = id;
    document.getElementById('typeName').value = t.name;
    document.getElementById('typeIcon').value = t.icon;
    document.getElementById('typeColor').value = t.color;
    document.getElementById('typeDaily').value = t.dailyTarget;
    remindOn = t.remindOn;
    document.getElementById('typeRemindToggle').className = 'event-type-toggle' + (remindOn ? ' on' : '');
    document.getElementById('remindTimesField').style.display = remindOn ? 'block' : 'none';
    remindTimes = t.reminders.length > 0 ? [...t.reminders] : ['08:00'];
    renderRemindPills();
    document.getElementById('typeModal').style.display = 'flex';
}

function closeTypeModal() {
    document.getElementById('typeModal').style.display = 'none';
}

let remindOn = true;
let remindTimes = ['08:00'];
function toggleRemind() {
    remindOn = !remindOn;
    document.getElementById('typeRemindToggle').className = 'event-type-toggle' + (remindOn ? ' on' : '');
    document.getElementById('remindTimesField').style.display = remindOn ? 'block' : 'none';
}
function addRemindTime() {
    if (remindTimes.length >= 8) return;
    remindTimes.push('12:00');
    renderRemindPills();
}
function removeRemindTime(i) {
    remindTimes.splice(i, 1);
    renderRemindPills();
}
function updateRemindTime(i, val) {
    remindTimes[i] = val;
}
function renderRemindPills() {
    const el = document.getElementById('remindPills');
    el.innerHTML = remindTimes.map((t, i) =>
        '<span class="time-pill selected">' +
        '<input type="time" value="' + t + '" onchange="updateRemindTime(' + i + ', this.value)" style="border:none;background:none;font-size:12px;width:auto;padding:0">' +
        (remindTimes.length > 1 ? '<span class="remove" onclick="removeRemindTime(' + i + ')">×</span>' : '') +
        '</span>'
    ).join('');
}

function saveType() {
    const name = document.getElementById('typeName').value.trim();
    if (!name) return;
    const editId = document.getElementById('editTypeId').value;

    const obj = {
        id: editId ? parseInt(editId) : DATA.nextId++,
        name,
        icon: document.getElementById('typeIcon').value,
        color: document.getElementById('typeColor').value,
        dailyTarget: parseInt(document.getElementById('typeDaily').value) || 1,
        reminders: remindOn ? remindTimes.map(t => t) : [],
        remindOn
    };

    if (editId) {
        DATA.types = DATA.types.map(x => x.id === obj.id ? obj : x);
    } else {
        DATA.types.push(obj);
    }
    save();
    closeTypeModal();
    refreshHome(); refreshCalendar(); refreshSettings();
}

function deleteType(id) {
    if (!confirm('确定删除此事件类型？')) return;
    DATA.types = DATA.types.filter(x => x.id !== id);
    DATA.records = DATA.records.filter(r => r.typeId !== id);
    save();
    refreshHome(); refreshCalendar(); refreshSettings();
}

// ===== 导航 =====
document.querySelectorAll('.nav-item').forEach(btn => {
    btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
        document.querySelectorAll('.page').forEach(p => {
            p.classList.toggle('active', p.id === 'page-' + tab);
        });
        if (tab === 'cal') refreshCalendar();
        if (tab === 'settings') refreshSettings();
    });
});

initCal();
document.getElementById('headerDate').textContent = new Date().toLocaleDateString('zh-CN', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
refreshHome();
refreshCalendar();
