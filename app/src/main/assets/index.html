<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>猫药管家</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="header">
    <h1>猫药管家</h1>
    <span class="date" id="headerDate"></span>
</header>

<main class="main">

    <!-- ===== 首页 ===== -->
    <section id="page-home" class="page active">
        <div class="card">
            <div class="card-header">
                <span class="card-title">今日事件</span>
                <span class="card-subtitle" id="todaySummary"></span>
            </div>
            <div id="eventList"><div class="empty-events">暂无事件，去「设置」添加</div></div>
        </div>
    </section>

    <!-- ===== 计算器 ===== -->
    <section id="page-calc" class="page">
        <div class="card">
            <div class="card-title" style="margin-bottom:14px">分药计算器</div>
            <div class="calc-group">
                <label class="calc-label">猫咪体重</label>
                <input type="number" class="calc-input" id="calcWeight" step="0.1" placeholder="kg，例：5.0">
            </div>
            <div class="calc-group">
                <label class="calc-label">医嘱剂量</label>
                <input type="number" class="calc-input" id="calcDosage" step="0.5" placeholder="mg/kg，例：5">
            </div>
            <div class="calc-group">
                <label class="calc-label">药片规格</label>
                <input type="number" class="calc-input" id="calcStrength" step="0.1" placeholder="mg/片，例：30">
                <div class="calc-quick" id="quickPills"></div>
            </div>
            <button class="btn btn-primary btn-full" onclick="doCalc()">计算</button>
            <div class="calc-result" id="calcResult">
                <div class="big-num" id="calcMainResult"></div>
                <div class="detail" id="calcDetail"></div>
            </div>
        </div>
    </section>

    <!-- ===== 日历 ===== -->
    <section id="page-cal" class="page">
        <div class="card">
            <div class="cal-nav">
                <button onclick="changeMonth(-1)">‹</button>
                <span class="cal-month-label" id="calLabel"></span>
                <button onclick="changeMonth(1)">›</button>
            </div>
            <div class="cal-weekdays"><span>日</span><span>一</span><span>二</span><span>三</span><span>四</span><span>五</span><span>六</span></div>
            <div class="cal-grid" id="calGrid"></div>
            <div class="cal-legend" id="calLegend"></div>
        </div>
        <div class="card">
            <div class="card-title" style="margin-bottom:8px">日详情</div>
            <div class="day-summary" id="daySummary"></div>
        </div>
        <div class="card">
            <div class="card-title" style="margin-bottom:8px">本月统计</div>
            <div id="monthStats" style="font-size:14px;line-height:2"></div>
        </div>
    </section>

    <!-- ===== 设置 ===== -->
    <section id="page-settings" class="page">
        <div class="card">
            <div class="card-header">
                <span class="card-title">事件类型</span>
                <button class="btn btn-sm btn-outline" onclick="showAddType()">+ 添加</button>
            </div>
            <div id="typeList"><div class="empty-events">暂无事件类型</div></div>
        </div>
    </section>

</main>

<nav class="nav">
    <button class="nav-item active" data-tab="home"><span class="nav-icon m-icon">home</span>首页</button>
    <button class="nav-item" data-tab="calc"><span class="nav-icon m-icon">calculate</span>计算器</button>
    <button class="nav-item" data-tab="cal"><span class="nav-icon m-icon">calendar_month</span>日历</button>
    <button class="nav-item" data-tab="settings"><span class="nav-icon m-icon">settings</span>设置</button>
</nav>

<!-- ===== 添加/编辑事件类型弹窗 ===== -->
<div class="modal-overlay" id="typeModal" style="display:none">
    <div class="modal">
        <h3 id="typeModalTitle">添加事件类型</h3>
        <input type="hidden" id="editTypeId">
        <div class="field">
            <label>名称</label>
            <input type="text" id="typeName" placeholder="如：喂药、运动、喝水">
        </div>
        <div class="field">
            <label>图标</label>
            <select id="typeIcon">
                <option value="pill">pill 药品</option>
                <option value="exercise">exercise 运动</option>
                <option value="water_drop">water_drop 喝水</option>
                <option value="science">science 补剂</option>
                <option value="restaurant">restaurant 饮食</option>
                <option value="menu_book">menu_book 阅读</option>
                <option value="pets">pets 宠物</option>
                <option value="favorite">favorite 重要</option>
            </select>
        </div>
        <div class="field">
            <label>颜色</label>
            <select id="typeColor">
                <option value="#5B8DEF">蓝</option>
                <option value="#4CAF50">绿</option>
                <option value="#F5A623">橙</option>
                <option value="#EF6B6B">红</option>
                <option value="#9B59B6">紫</option>
                <option value="#1ABC9C">青</option>
            </select>
        </div>
        <div class="field">
            <label>每日目标次数</label>
            <input type="number" id="typeDaily" value="2" min="1" max="10">
        </div>
        <div class="field switch-wrap">
            <button class="event-type-toggle on" id="typeRemindToggle" onclick="toggleRemind()"></button>
            <label>开启定时提醒</label>
        </div>
        <div class="field" id="remindTimesField">
            <label>提醒时间</label>
            <div class="time-pills" id="remindPills"></div>
            <button class="add-time-btn" onclick="addRemindTime()">+ 添加时间</button>
        </div>
        <div class="btn-row">
            <button class="btn btn-outline" onclick="closeTypeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveType()">保存</button>
        </div>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
